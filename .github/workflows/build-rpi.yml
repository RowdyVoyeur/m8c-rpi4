name: Raspberry Pi 4 Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-arm64:
    name: Build for RPi OS (64-bit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build in ARM64 Container
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: bullseye
          install: |
            apt-get update
            apt-get install -y build-essential libsdl2-dev libasound2-dev libserialport-dev pkg-config
          run: |
            # We use pkg-config to help the compiler find SDL2 and SerialPort
            export CFLAGS=$(pkg-config --cflags sdl2 libserialport)
            export LDFLAGS=$(pkg-config --libs sdl2 libserialport)
            make clean
            make
